<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>InsureX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14; --surface: #151820; --surface2: #1c2030; --border: #252b3b;
      --accent: #c9a84c; --accent2: #e8c97a; --text: #e8ecf4; --text-muted: #7a8499;
      --danger: #e05555; --radius: 10px;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', sans-serif;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; min-height: 100vh; }

    /* LOGIN */
    .login-page { display: flex; min-height: 100vh; }
    .login-card { width: 420px; flex-shrink: 0; background: var(--surface); display: flex; flex-direction: column; justify-content: center; padding: 60px 48px; border-right: 1px solid var(--border); animation: slideIn 0.5s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateX(-24px); } to { opacity:1; transform:translateX(0); } }
    .login-brand { margin-bottom: 48px; }
    .brand-icon { font-size: 36px; color: var(--accent); display: block; margin-bottom: 12px; }
    .login-brand h1 { font-family: var(--font-display); font-size: 32px; color: var(--text); letter-spacing: 1px; }
    .login-brand p { color: var(--text-muted); margin-top: 4px; font-size: 13px; }
    .login-form { display: flex; flex-direction: column; gap: 20px; }
    .field label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; color: var(--text); font-family: var(--font-body); font-size: 14px; outline: none; transition: border-color 0.2s; }
    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: var(--text-muted); }
    .btn-login { margin-top: 8px; padding: 14px; background: var(--accent); color: #0d0f14; border: none; border-radius: var(--radius); font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-login:hover { background: var(--accent2); }
    .login-error { color: var(--danger); font-size: 13px; min-height: 18px; text-align: center; }
    .login-visual { flex: 1; background: linear-gradient(135deg, #0d1220 0%, #111827 50%, #0a0d14 100%); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    .visual-circle { position: absolute; border-radius: 50%; border: 1px solid rgba(201,168,76,0.15); }
    .c1 { width:480px; height:480px; top:-100px; right:-120px; }
    .c2 { width:320px; height:320px; bottom:40px; left:-80px; border-color:rgba(201,168,76,0.08); }
    .c3 { width:200px; height:200px; top:50%; right:80px; border-color:rgba(201,168,76,0.2); }
    .visual-text { position: relative; z-index: 2; text-align: center; padding: 40px; }
    .visual-text h2 { font-family: var(--font-display); font-size: 36px; line-height: 1.3; color: var(--text); margin-bottom: 16px; }
    .visual-text p { color: var(--text-muted); line-height: 1.7; font-size: 15px; }

    /* APP */
    .app-page { display: flex; flex-direction: column; min-height: 100vh; }
    .app-header { display: flex; align-items: center; gap: 16px; padding: 0 24px; height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
    .header-brand { display: flex; align-items: center; gap: 8px; font-family: var(--font-display); font-size: 18px; color: var(--accent); white-space: nowrap; margin-right: 8px; }
    .app-nav { display: flex; align-items: center; gap: 2px; flex: 1; overflow-x: auto; scrollbar-width: none; }
    .app-nav::-webkit-scrollbar { display: none; }
    .nav-btn { padding: 7px 14px; background: transparent; border: none; border-radius: 7px; color: var(--text-muted); font-family: var(--font-body); font-size: 13px; cursor: pointer; white-space: nowrap; transition: background 0.15s, color 0.15s; }
    .nav-btn:hover { background: var(--surface2); color: var(--text); }
    .nav-btn.active { background: rgba(201,168,76,0.15); color: var(--accent); font-weight: 500; }
    .btn-logout { padding: 7px 16px; background: transparent; border: 1px solid var(--border); border-radius: 7px; color: var(--text-muted); font-family: var(--font-body); font-size: 13px; cursor: pointer; white-space: nowrap; transition: border-color 0.15s, color 0.15s; }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }
    .app-main { flex: 1; padding: 28px 32px; }
    .content-area { animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-title { font-family: var(--font-display); font-size: 22px; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 320px; color: var(--text-muted); gap: 12px; font-size: 13px; }
    .empty-state span { font-size: 40px; color: var(--border); }
    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: var(--surface2); border-bottom: 1px solid var(--border); }
    th { padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 500; letter-spacing: 1.2px; text-transform: uppercase; color: var(--text-muted); white-space: nowrap; }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text); font-size: 13px; vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    .td-actions { display: flex; gap: 8px; }
    .btn-primary { padding: 9px 20px; background: var(--accent); color: #0d0f14; border: none; border-radius: 7px; font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-secondary { padding: 9px 20px; background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: 7px; font-family: var(--font-body); font-size: 13px; cursor: pointer; }
    .btn-edit { padding: 6px 12px; background: rgba(201,168,76,0.1); color: var(--accent); border: 1px solid rgba(201,168,76,0.25); border-radius: 6px; font-size: 12px; font-family: var(--font-body); cursor: pointer; }
    .btn-edit:hover { background: rgba(201,168,76,0.2); }
    .btn-delete { padding: 6px 12px; background: rgba(224,85,85,0.1); color: var(--danger); border: 1px solid rgba(224,85,85,0.25); border-radius: 6px; font-size: 12px; font-family: var(--font-body); cursor: pointer; }
    .btn-delete:hover { background: rgba(224,85,85,0.2); }
    .no-data { padding: 40px; text-align: center; color: var(--text-muted); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; display: flex; align-items: center; justify-content: center; }
    .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: 480px; max-width: 95vw; box-shadow: var(--shadow); }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 16px; border-bottom: 1px solid var(--border); }
    .modal-header h3 { font-family: var(--font-display); font-size: 18px; }
    .modal-close { background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
    .modal-close:hover { background: var(--surface2); }
    .modal-fields { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; max-height: 60vh; overflow-y: auto; }
    .modal-fields .field input { width: 100%; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 24px 20px; border-top: 1px solid var(--border); }
  </style>
</head>
<body>

  <!-- LOGIN PAGE -->
  <div id="loginPage" class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <span class="brand-icon">⬡</span>
        <h1>InsureX</h1>
        <p>Страховое агентство</p>
      </div>
      <div class="login-form">
        <div class="field">
          <label>Email</label>
          <input type="text" id="email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label>Пароль</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>
        <button class="btn-login" id="loginBtn">Войти</button>
        <div id="loginError" class="login-error"></div>
      </div>
    </div>
    <div class="login-visual">
      <div class="visual-circle c1"></div>
      <div class="visual-circle c2"></div>
      <div class="visual-circle c3"></div>
      <div class="visual-text">
        <h2>Управляйте данными<br/>вашего агентства</h2>
        <p>Единая система учёта договоров,<br/>клиентов и платежей.</p>
      </div>
    </div>
  </div>

  <!-- APP PAGE -->
  <div id="appPage" class="app-page" style="display:none;">
    <header class="app-header">
      <div class="header-brand"><span>⬡</span><span>InsureX</span></div>
      <nav class="app-nav">
        <button class="nav-btn" data-entity="AgentsContrl">Агенты</button>
        <button class="nav-btn" data-entity="AgreementsVehiclesContrl">Договоры ТС</button>
        <button class="nav-btn" data-entity="ClientsContrl">Клиенты</button>
        <button class="nav-btn" data-entity="InsuranceContrl">Страховки</button>
        <button class="nav-btn" data-entity="InsuranceTypesContrl">Типы страховок</button>
        <button class="nav-btn" data-entity="PaymentsContrl">Платежи</button>
        <button class="nav-btn" data-entity="PoliciesContrl">Полисы</button>
        <button class="nav-btn" data-entity="VehiclesContrl">Транспорт</button>
      </nav>
      <button class="btn-logout" id="logoutBtn">Выйти</button>
    </header>
    <main class="app-main">
      <div id="contentArea" class="content-area">
        <div class="empty-state"><span>⬡</span><p>Выберите раздел в меню выше</p></div>
      </div>
    </main>
    <!-- MODAL -->
    <div id="modal" class="modal-overlay" style="display:none;">
      <div class="modal-box">
        <div class="modal-header">
          <h3 id="modalTitle">Добавить запись</h3>
          <button class="modal-close" id="modalCloseBtn">✕</button>
        </div>
        <div id="modalFields" class="modal-fields"></div>
        <div class="modal-footer">
          <button class="btn-secondary" id="modalCancelBtn">Отмена</button>
          <button class="btn-primary" id="modalSaveBtn">Сохранить</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    var accessToken = "";
    var refreshToken = "";
    var currentController = "";
    var modalMode = "add";
    var editItemId = null;
    var currentKeys = [];

    var LABELS = {
      AgentsContrl:"Агенты", AgreementsVehiclesContrl:"Договоры ТС",
      ClientsContrl:"Клиенты", InsuranceContrl:"Страховки",
      InsuranceTypesContrl:"Типы страховок", PaymentsContrl:"Платежи",
      PoliciesContrl:"Полисы", VehiclesContrl:"Транспорт"
    };

    // COOKIES
    function setCookie() {
      var exp = new Date(Date.now() + 3600000).toUTCString();
      document.cookie = "accessToken=" + encodeURIComponent(accessToken) + "; expires=" + exp + "; path=/";
      document.cookie = "refreshToken=" + encodeURIComponent(refreshToken) + "; expires=" + exp + "; path=/";
    }
    function getCookieVal(name) {
      var parts = document.cookie.split(";");
      for (var i = 0; i < parts.length; i++) {
        var p = parts[i].trim().split("=");
        if (p[0] === name) return decodeURIComponent(p.slice(1).join("=") || "");
      }
      return "";
    }
    function clearCookies() {
      document.cookie = "accessToken=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/";
      document.cookie = "refreshToken=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/";
    }

    // PAGES
    function showApp()   { document.getElementById("loginPage").style.display = "none";  document.getElementById("appPage").style.display = "flex"; }
    function showLogin() { document.getElementById("appPage").style.display  = "none";  document.getElementById("loginPage").style.display = "flex"; }

    // AUTH
    document.getElementById("loginBtn").onclick = doLogin;
    document.getElementById("password").onkeydown = function(e) { if (e.key === "Enter") doLogin(); };

    async function doLogin() {
      var email    = document.getElementById("email").value.trim();
      var password = document.getElementById("password").value;
      var errEl    = document.getElementById("loginError");
      errEl.textContent = "";
      if (!email || !password) { errEl.textContent = "Введите email и пароль"; return; }
      try {
        var r = await fetch("http://localhost:5000/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: email, password: password })
        });
        if (!r.ok) { errEl.textContent = "Неверный email или пароль (статус " + r.status + ")"; return; }
        var d = await r.json();
        accessToken = d.accessToken; refreshToken = d.refreshToken;
        setCookie();
        showApp();
      } catch(e) { errEl.textContent = "Нет соединения с сервером"; }
    }

    document.getElementById("logoutBtn").onclick = function() {
      accessToken = ""; refreshToken = ""; clearCookies();
      document.getElementById("email").value = "";
      document.getElementById("password").value = "";
      document.getElementById("loginError").textContent = "";
      showLogin();
    };

    // API
    async function api(url, method, body) {
      method = method || "GET";
      var token = getCookieVal("accessToken") || accessToken;
      var opts = { method: method, headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token } };
      if (body) opts.body = JSON.stringify(body);
      var r = await fetch("http://localhost:5000/" + url, opts);
      if (r.status === 401) {
        try {
          var ref = await fetch("http://localhost:5000/api/auth/refresh", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({refreshToken:refreshToken}) });
          if (ref.ok) { var rd = await ref.json(); accessToken = rd.accessToken; refreshToken = rd.refreshToken; setCookie(); return api(url, method, body); }
        } catch(e) {}
        document.getElementById("logoutBtn").onclick();
        return null;
      }
      if (!r.ok) { alert("Ошибка API: " + r.status); return null; }
      if (r.status === 204) return null;
      return await r.json();
    }

    // NAV
    document.querySelectorAll(".nav-btn").forEach(function(btn) {
      btn.onclick = function() { loadEntity(btn.dataset.entity); };
    });

    async function loadEntity(controller) {
      currentController = controller;
      document.querySelectorAll(".nav-btn").forEach(function(b) { b.classList.toggle("active", b.dataset.entity === controller); });
      var data = await api(controller);
      if (!data) return;
      renderTable(data);
    }

    function renderTable(data) {
      var area = document.getElementById("contentArea");
      currentKeys = data.length > 0 ? Object.keys(data[0]) : [];

      var hdr = document.createElement("div");
      hdr.className = "section-header";
      var title = document.createElement("h2");
      title.className = "section-title";
      title.textContent = LABELS[currentController] || currentController;
      var addBtn = document.createElement("button");
      addBtn.className = "btn-primary";
      addBtn.textContent = "+ Добавить";
      addBtn.onclick = function() { openAddModal(); };
      hdr.appendChild(title); hdr.appendChild(addBtn);

      area.innerHTML = "";
      area.appendChild(hdr);

      if (data.length === 0) {
        var nd = document.createElement("div");
        nd.className = "no-data"; nd.textContent = "Нет данных";
        area.appendChild(nd); return;
      }

      var wrap = document.createElement("div"); wrap.className = "table-wrap";
      var tbl = document.createElement("table");
      var thead = document.createElement("thead");
      var hr = document.createElement("tr");
      var th0 = document.createElement("th"); th0.textContent = "Действия"; hr.appendChild(th0);
      currentKeys.forEach(function(k) { var th = document.createElement("th"); th.textContent = k; hr.appendChild(th); });
      thead.appendChild(hr); tbl.appendChild(thead);

      var tbody = document.createElement("tbody");
      data.forEach(function(item) {
        var tr = document.createElement("tr");
        // actions cell
        var td0 = document.createElement("td");
        var acts = document.createElement("div"); acts.className = "td-actions";
        var editBtn = document.createElement("button"); editBtn.className = "btn-edit"; editBtn.textContent = "Изменить";
        editBtn.onclick = (function(i) { return function() { openEditModal(i); }; })(item);
        var delBtn = document.createElement("button"); delBtn.className = "btn-delete"; delBtn.textContent = "Удалить";
        delBtn.onclick = (function(id) { return function() { doDelete(id); }; })(item[currentKeys[0]]);
        acts.appendChild(editBtn); acts.appendChild(delBtn); td0.appendChild(acts); tr.appendChild(td0);
        // data cells
        currentKeys.forEach(function(k) { var td = document.createElement("td"); td.textContent = item[k] != null ? item[k] : ""; tr.appendChild(td); });
        tbody.appendChild(tr);
      });

      tbl.appendChild(tbody); wrap.appendChild(tbl); area.appendChild(wrap);
    }

    async function doDelete(id) {
      if (!confirm("Удалить запись?")) return;
      await api(currentController + "/" + id, "DELETE");
      loadEntity(currentController);
    }

    // MODAL
    document.getElementById("modalCloseBtn").onclick  = closeModal;
    document.getElementById("modalCancelBtn").onclick = closeModal;
    document.getElementById("modalSaveBtn").onclick   = saveModal;
    document.getElementById("modal").onclick = function(e) { if (e.target === this) closeModal(); };

    function closeModal() { document.getElementById("modal").style.display = "none"; }

    function makeInputField(key, value) {
      var div = document.createElement("div"); div.className = "field";
      var lbl = document.createElement("label"); lbl.textContent = key;
      var inp = document.createElement("input"); inp.type = "text"; inp.dataset.key = key; inp.value = value != null ? value : ""; inp.placeholder = key;
      div.appendChild(lbl); div.appendChild(inp);
      return div;
    }

    function openAddModal() {
      modalMode = "add"; editItemId = null;
      document.getElementById("modalTitle").textContent = "Добавить запись";
      var fields = document.getElementById("modalFields");
      fields.innerHTML = "";
      // skip first key (ID), show the rest
      var keysToShow = currentKeys.length > 1 ? currentKeys.slice(1) : currentKeys;
      keysToShow.forEach(function(k) { fields.appendChild(makeInputField(k, "")); });
      document.getElementById("modal").style.display = "flex";
    }

    function openEditModal(item) {
      modalMode = "edit"; editItemId = item[currentKeys[0]];
      document.getElementById("modalTitle").textContent = "Изменить запись";
      var fields = document.getElementById("modalFields");
      fields.innerHTML = "";
      currentKeys.forEach(function(k) { fields.appendChild(makeInputField(k, item[k])); });
      document.getElementById("modal").style.display = "flex";
    }

    async function saveModal() {
      var body = {};
      document.querySelectorAll("#modalFields input[data-key]").forEach(function(inp) {
        body[inp.dataset.key] = inp.value;
      });
      if (Object.keys(body).length === 0) { alert("Нет полей для сохранения"); return; }
      if (modalMode === "add") {
        await api(currentController, "POST", body);
      } else {
        await api(currentController + "/" + editItemId, "PUT", body);
      }
      closeModal();
      loadEntity(currentController);
    }

    // AUTO-LOGIN
    var saved = getCookieVal("accessToken");
    if (saved) { accessToken = saved; showApp(); }
  </script>
</body>
</html>
